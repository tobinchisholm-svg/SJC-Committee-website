backend:
  name: github
  repo: tobinchisholm-svg/SJC-Committee-website
  branch: main
  base_url: https://stjoeph.net
  auth_endpoint: api/auth

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "bulletins"
    label: "Bulletins"
    folder: "bulletins"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Bulletin PDF", name: "file", widget: "file" }
      - { label: "Second PDF (optional)", name: "file2", widget: "file", required: false }

  - name: "announcements"
    label: "Announcements"
    folder: "announcements"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Text", name: "body", widget: "markdown", required: false }
      - { label: "Image or PDF", name: "attachment", widget: "file", required: false }

  - name: "calendar"
    label: "Calendar Events"
    folder: "events"
    create: true
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: "gallery"
    label: "Parish Gallery"
    folder: "gallery"
    create: true
    media_folder: "/gallery-photos"
    public_folder: "/gallery-photos"
    fields:
      - { label: "Caption", name: "title", widget: "string" }
      - { label: "Photo", name: "image", widget: "image" }